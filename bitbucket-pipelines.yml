image: php:8.2-cli

definitions:
  steps:
    - step: &build-and-test
        name: Build & Test
        caches:
          - composer
          - node
        script:
          # Install system deps
          - apt-get update && apt-get install -y git zip unzip libzip-dev libpng-dev libgmp-dev nodejs npm
          - docker-php-ext-install pdo pdo_mysql zip gd bcmath gmp

          # Install Composer
          - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer

          # PHP dependencies
          - composer install --no-interaction --prefer-dist --optimize-autoloader

          # Node dependencies + build
          - npm ci
          - npm run build

          # Verify artisan works
          - php artisan --version
          - php artisan route:list --compact

pipelines:
  branches:
    main:
      - step: *build-and-test

  pull-requests:
    '**':
      - step: *build-and-test
